<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HW1: GridWorld 強化學習</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f4f9;
            color: #333;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        h1 {
            color: #2c3e50;
            margin-bottom: 15px;
        }

        .controls {
            margin-bottom: 15px;
            background: #fff;
            padding: 15px 25px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }

        .controls label {
            font-weight: bold;
        }

        .controls input {
            padding: 5px 10px;
            font-size: 16px;
            width: 60px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }

        .controls button {
            padding: 8px 18px;
            font-size: 16px;
            font-weight: bold;
            background-color: #3498db;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            transition: background 0.3s;
        }

        .controls button:hover:not(:disabled) {
            background-color: #2980b9;
        }

        .controls button:disabled {
            background-color: #95a5a6;
            cursor: not-allowed;
        }

        .controls button.reset {
            background-color: #e74c3c;
        }

        .controls button.reset:hover:not(:disabled) {
            background-color: #c0392b;
        }

        .controls button.execute {
            background-color: #27ae60;
        }

        .controls button.execute:hover:not(:disabled) {
            background-color: #219150;
        }

        .status-panel {
            margin-bottom: 15px;
            font-size: 16px;
            font-weight: bold;
            color: #555;
            height: 24px;
        }

        /* 原始設定網格 */
        #grid-container {
            display: grid;
            gap: 2px;
            background-color: #ccc;
            border: 2px solid #999;
            padding: 2px;
            margin-bottom: 30px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.15);
        }

        /* 結果網格展示區 */
        #results-area {
            display: flex;
            gap: 40px;
            justify-content: center;
            flex-wrap: wrap;
            width: 100%;
            max-width: 1200px;
        }

        .result-box {
            display: flex;
            flex-direction: column;
            align-items: center;
            background: #fff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .result-title {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 15px;
            color: #2c3e50;
            text-align: center;
        }

        .result-grid-container {
            display: grid;
            gap: 2px;
            background-color: #ccc;
            border: 2px solid #999;
            padding: 2px;
        }

        /* 單元格樣式 */
        .cell {
            width: 60px;
            height: 60px;
            background-color: white;
            border: 1px solid #ddd;
            cursor: pointer;
            transition: background-color 0.2s;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: bold;
        }

        .cell:hover {
            opacity: 0.8;
        }

        .result-grid-container .cell {
            cursor: default;
        }

        /* 結果網格不可點擊 */
        .result-grid-container .cell:hover {
            opacity: 1;
        }

        .cell.start {
            background-color: #2ecc71;
            color: white !important;
        }

        .cell.end {
            background-color: #e74c3c;
            color: white !important;
        }

        .cell.obstacle {
            background-color: #7f8c8d;
        }

        .cell.path {
            background-color: #f1c40f;
            color: #333;
        }

        /* 高亮路徑顏色 */
    </style>
</head>

<body>

    <h1>HW1: GridWorld 強化學習</h1>

    <div class="controls">
        <label for="grid-size">維度 n (5~9):</label>
        <input type="number" id="grid-size" min="5" max="9" value="5">
        <button id="btn-generate">生成網格</button>
        <button id="btn-reset" class="reset">重設</button>
        <button id="btn-execute" class="execute" disabled>執行 (評估與迭代)</button>
    </div>

    <div class="status-panel" id="status-text">請點擊生成網格，或直接點擊下方預設網格設定起點。</div>

    <div id="grid-container"></div>

    <div id="results-area"></div>

    <script>
        const gridContainer = document.getElementById('grid-container');
        const resultsArea = document.getElementById('results-area');
        const gridSizeInput = document.getElementById('grid-size');
        const btnGenerate = document.getElementById('btn-generate');
        const btnReset = document.getElementById('btn-reset');
        const btnExecute = document.getElementById('btn-execute');
        const statusText = document.getElementById('status-text');

        let currentN = 5;
        let clickCount = 0;
        let totalObstaclesAllowed = 0;
        let selectedCells = new Set();
        let startIndex = -1;
        let endIndex = -1;
        let obstacleIndices = [];

        function updateStatus() {
            if (clickCount === 0) {
                statusText.innerText = '請點擊網格設定「起點」(綠色)';
                statusText.style.color = '#2ecc71';
                btnExecute.disabled = true;
            } else if (clickCount === 1) {
                statusText.innerText = '請點擊網格設定「終點」(紅色)';
                statusText.style.color = '#e74c3c';
            } else if (clickCount >= 2 && clickCount < 2 + totalObstaclesAllowed) {
                const remaining = (2 + totalObstaclesAllowed) - clickCount;
                statusText.innerText = `請點擊網格設定「障礙物」(灰色)，剩餘 ${remaining} 個`;
                statusText.style.color = '#7f8c8d';
            } else {
                statusText.innerText = '設定完成！可以點擊「執行」開始運算。';
                statusText.style.color = '#333';
                btnExecute.disabled = false;
            }
        }

        function handleCellClick(e) {
            const cell = e.currentTarget;
            const index = parseInt(cell.dataset.index);

            if (selectedCells.has(index) || clickCount >= 2 + totalObstaclesAllowed) return;

            if (clickCount === 0) {
                cell.classList.add('start');
                startIndex = index;
            } else if (clickCount === 1) {
                cell.classList.add('end');
                endIndex = index;
            } else {
                cell.classList.add('obstacle');
                obstacleIndices.push(index);
            }

            selectedCells.add(index);
            clickCount++;
            updateStatus();
        }

        function generateGrid() {
            let n = parseInt(gridSizeInput.value);
            if (isNaN(n) || n < 5 || n > 9) {
                alert("請輸入介於 5 到 9 之間的整數！");
                gridSizeInput.value = currentN;
                return;
            }

            currentN = n;
            totalObstaclesAllowed = n - 2;

            clickCount = 0;
            startIndex = -1;
            endIndex = -1;
            obstacleIndices = [];
            selectedCells.clear();
            btnExecute.disabled = true;

            gridContainer.style.gridTemplateColumns = `repeat(${n}, 60px)`;
            gridContainer.style.gridTemplateRows = `repeat(${n}, 60px)`;
            gridContainer.innerHTML = '';
            resultsArea.innerHTML = ''; // 清空先前的結果

            for (let i = 0; i < n * n; i++) {
                const cell = document.createElement('div');
                cell.classList.add('cell');
                cell.dataset.index = i;
                cell.addEventListener('click', handleCellClick);
                gridContainer.appendChild(cell);
            }
            updateStatus();
        }

        btnGenerate.addEventListener('click', generateGrid);
        btnReset.addEventListener('click', generateGrid);

        btnExecute.addEventListener('click', async () => {
            btnExecute.disabled = true;
            statusText.innerText = '運算中... (向後端請求資料)';
            statusText.style.color = '#f39c12';
            resultsArea.innerHTML = '';

            const payload = {
                n: currentN,
                end: endIndex,
                obstacles: obstacleIndices
            };

            try {
                // 同時發送兩個請求給後端 API
                const [evalRes, valIterRes] = await Promise.all([
                    fetch('/api/evaluate', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    }),
                    fetch('/api/value_iteration', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    })
                ]);

                const evalData = await evalRes.json();
                const valIterData = await valIterRes.json();

                if (evalRes.ok && valIterRes.ok) {
                    createResultGrid('HW1-2: 隨機策略評估 (Policy Evaluation)', evalData.policy, evalData.values);
                    createResultGrid('HW1-3: 最佳政策 (Value Iteration)', valIterData.policy, valIterData.values);

                    statusText.innerText = '運算完成！雙結果已並列顯示於下方，並以黃色高亮路線。';
                    statusText.style.color = '#2ecc71';
                } else {
                    let errMsg = (evalData.error || '') + ' ' + (valIterData.error || '');
                    alert('後端運算失敗: ' + errMsg);
                    statusText.innerText = '運算失敗。';
                    statusText.style.color = '#e74c3c';
                }
            } catch (err) {
                alert('網路錯誤: ' + err);
                statusText.innerText = '網路連接錯誤。';
                statusText.style.color = '#e74c3c';
            } finally {
                btnExecute.disabled = false;
            }
        });

        // 尋找路徑函數
        function findPath(policy, start, end, obstacles, n) {
            let path = [];
            let current = start;
            let visited = new Set();

            if (start === -1 || end === -1) return path;

            while (current !== end) {
                if (obstacles.includes(current) || visited.has(current)) {
                    break; // 撞牆或陷入死胡同/無限迴圈
                }

                let arrow = policy[current];
                if (!arrow) break;

                path.push(current);
                visited.add(current);

                let r = Math.floor(current / n);
                let c = current % n;

                if (arrow === '↑') r = Math.max(0, r - 1);
                else if (arrow === '↓') r = Math.min(n - 1, r + 1);
                else if (arrow === '←') c = Math.max(0, c - 1);
                else if (arrow === '→') c = Math.min(n - 1, c + 1);

                let next = r * n + c;
                if (obstacles.includes(next)) {
                    next = current; // 撞到障礙物停在原地
                }
                current = next;
            }
            return path;
        }

        function createResultGrid(title, policy, values) {
            const wrapper = document.createElement('div');
            wrapper.className = 'result-box';

            const titleEl = document.createElement('div');
            titleEl.className = 'result-title';
            titleEl.innerText = title;
            wrapper.appendChild(titleEl);

            const gridEl = document.createElement('div');
            gridEl.className = 'result-grid-container';
            gridEl.style.gridTemplateColumns = `repeat(${currentN}, 60px)`;
            gridEl.style.gridTemplateRows = `repeat(${currentN}, 60px)`;

            // 計算這份 policy 走出的路徑
            let pathIndices = findPath(policy, startIndex, endIndex, obstacleIndices, currentN);

            for (let i = 0; i < currentN * currentN; i++) {
                const cell = document.createElement('div');
                cell.className = 'cell';

                if (obstacleIndices.includes(i)) {
                    cell.classList.add('obstacle');
                } else if (i === endIndex) {
                    cell.classList.add('end');
                } else if (i === startIndex) {
                    cell.classList.add('start');
                } else if (pathIndices.includes(i)) {
                    cell.classList.add('path'); // 如果是路徑的一部分則高亮
                }

                if (!obstacleIndices.includes(i)) {
                    let v = values[i].toFixed(3);

                    if (i === endIndex) {
                        cell.innerHTML = `<span></span><span>${v}</span>`;
                    } else {
                        let arrow = policy[i] || '';
                        cell.innerHTML = `<span>${arrow}</span><span>${v}</span>`;
                    }
                }

                gridEl.appendChild(cell);
            }

            wrapper.appendChild(gridEl);
            resultsArea.appendChild(wrapper);
        }

        // 初始化
        generateGrid();
    </script>
</body>

</html>
